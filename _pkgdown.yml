- title: "Diagnostic check plots"
  contents:
  - plot.anivis_check_na_timing
  - plot.anivis_check_na_gapsize
  - plot.anivis_check_confidence
  - as_plot_data

- title: "Geoms"
  contents:
  - geom_event_state
  - geom_event_point

- title: "Scales"
  contents:
  - scale_okabeito
  - scale_material

- title: "Colour palettes"
  contents:
  - okabeito_colors
  - palette_okabeito
  - material_colors
  - palette_material
  - palette_animovement

- title: "Themes"
  contents:
  - theme_animovement
  - theme_imputets
